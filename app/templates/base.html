<!doctype html>
<html lang="{{ current_lang(request) | default('en') }}" class="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ meta_description | default('AI Blog：AI 系统、软件架构与产品工程笔记。') }}">
    <meta name="color-scheme" content="dark">
    <title>{{ title | default("AI Blog") }}</title>
    {% if canonical_url %}<link rel="canonical" href="{{ canonical_url }}">{% endif %}
    <meta property="og:title" content="{{ og_title | default(title | default('AI Blog')) }}">
    <meta property="og:description" content="{{ og_description | default(meta_description | default('AI Blog：AI 系统、软件架构与产品工程笔记。')) }}">
    <meta property="og:type" content="{{ og_type | default('website') }}">
    <meta property="og:url" content="{{ og_url | default(canonical_url | default('')) }}">
    <meta property="og:image" content="{{ og_image | default('https://placehold.co/1200x630/0f172a/99f6e4.png?text=AI+Blog') }}">
    <meta name="twitter:card" content="{{ twitter_card | default('summary_large_image') }}">
    <meta name="twitter:title" content="{{ twitter_title | default(og_title | default(title | default('AI Blog'))) }}">
    <meta name="twitter:description" content="{{ twitter_description | default(og_description | default(meta_description | default('AI Blog：AI 系统、软件架构与产品工程笔记。'))) }}">
    <meta name="twitter:image" content="{{ twitter_image | default(og_image | default('https://placehold.co/1200x630/0f172a/99f6e4.png?text=AI+Blog')) }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/premium.css') }}">
    {% block extra_head %}{% endblock %}
  </head>
  <body class="min-h-screen bg-[#080b12] text-zinc-100 antialiased">
    {% include "components/flash_messages.html" %}
    {% block content %}{% endblock %}
  </body>
</html>
