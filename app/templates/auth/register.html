{% extends "base.html" %}

{% block content %}
<main class="site-shell flex min-h-screen items-center justify-center px-5 py-12 text-neutral-950">
  <section class="w-full max-w-md">
    <div class="mb-8">
      <div class="flex items-center justify-between gap-4">
        <a href="{{ url_with_lang(request, '/') }}" class="text-sm font-medium text-neutral-600 transition hover:text-neutral-950">{{ t(request, "brand.name") }}</a>
        {% include "components/language_switcher.html" %}
      </div>
      <h1 class="mt-4 text-3xl font-semibold tracking-tight text-neutral-950">创建账号</h1>
      <p class="mt-3 text-sm leading-6 text-neutral-600">注册普通用户账号后，可以使用评论等前台功能。</p>
    </div>

    {% if errors %}
      <div class="mb-5 rounded-md border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-medium text-rose-700">
        <ul class="space-y-1">
          {% for error in errors %}
            <li>{{ error }}</li>
          {% endfor %}
        </ul>
      </div>
    {% endif %}

    <form action="{{ url_with_lang(request, '/auth/register') }}" method="post" class="panel space-y-5 p-6">
      <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
      <input type="hidden" name="next" value="{{ next_url }}">

      <div>
        <label for="email" class="block text-sm font-medium text-neutral-700">邮箱</label>
        <input id="email" name="email" type="email" value="{{ email }}" autocomplete="email" required class="field">
      </div>

      <div>
        <label for="username" class="block text-sm font-medium text-neutral-700">用户名</label>
        <input id="username" name="username" type="text" value="{{ username }}" autocomplete="username" required class="field">
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-neutral-700">密码</label>
        <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required class="field">
      </div>

      <div>
        <label for="password_confirm" class="block text-sm font-medium text-neutral-700">确认密码</label>
        <input id="password_confirm" name="password_confirm" type="password" autocomplete="new-password" minlength="8" required class="field">
      </div>

      <button type="submit" class="btn-primary w-full">创建账号</button>
    </form>

    <p class="mt-5 text-center text-sm text-neutral-600">
      已有账号？
      <a href="{{ url_with_lang(request, '/auth/login', {'next': next_url}) }}" class="font-medium text-blue-600 transition hover:text-blue-700">去登录</a>
    </p>
  </section>
</main>
{% endblock %}
