{% extends "base.html" %}

{% block content %}
<main class="site-shell flex min-h-screen items-center justify-center px-5 py-12 text-zinc-100">
  <section class="w-full max-w-md">
    <div class="mb-8">
      <div class="flex items-center justify-between gap-4">
        <a href="{{ url_with_lang(request, '/') }}" class="text-sm font-medium text-zinc-400 transition hover:text-white">{{ t(request, "brand.name") }}</a>
        {% include "components/language_switcher.html" %}
      </div>
      <h1 class="mt-4 text-3xl font-semibold tracking-tight text-white">Sign in</h1>
      <p class="mt-3 text-sm leading-6 text-zinc-400">Use your account to comment. Admin accounts can continue to the dashboard.</p>
    </div>

    {% if error %}
      <div class="mb-5 rounded-md border border-rose-300/20 bg-rose-400/10 px-4 py-3 text-sm font-medium text-rose-100">
        {{ error }}
      </div>
    {% endif %}

    <form action="{{ url_with_lang(request, '/auth/login') }}" method="post" class="panel space-y-5 p-6">
      <input type="hidden" name="next" value="{{ next_url }}">

      <div>
        <label for="identifier" class="block text-sm font-medium text-zinc-200">{{ t(request, "login.identifier") }}</label>
        <input id="identifier" name="identifier" type="text" value="{{ identifier }}" autocomplete="username" required class="field">
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-zinc-200">{{ t(request, "login.password") }}</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required class="field">
      </div>

      <button type="submit" class="btn-primary w-full">{{ t(request, "login.submit") }}</button>
    </form>

    <p class="mt-5 text-center text-sm text-zinc-400">
      No account yet?
      <a href="{{ url_with_lang(request, '/auth/register', {'next': next_url}) }}" class="font-medium text-cyan-100 transition hover:text-white">Create one</a>
    </p>
  </section>
</main>
{% endblock %}
