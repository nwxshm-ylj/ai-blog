{% extends "base.html" %}

{% block content %}
<main class="flex min-h-screen items-center justify-center bg-slate-950 px-5 py-12 text-slate-100">
  <section class="w-full max-w-md">
    <div class="mb-8">
      <a href="/" class="text-sm font-medium text-slate-400 transition hover:text-white">AI Blog</a>
      <h1 class="mt-4 text-3xl font-semibold tracking-tight text-white">Admin login</h1>
      <p class="mt-3 text-sm leading-6 text-slate-400">Sign in to manage posts and projects.</p>
    </div>

    {% if error %}
      <div class="mb-5 rounded-md border border-rose-300/20 bg-rose-400/10 px-4 py-3 text-sm font-medium text-rose-100">
        {{ error }}
      </div>
    {% endif %}

    <form action="/auth/login" method="post" class="space-y-5 rounded-lg border border-white/10 bg-slate-900/60 p-6 shadow-sm shadow-black/20">
      <input type="hidden" name="next" value="{{ next_url }}">

      <div>
        <label for="identifier" class="block text-sm font-medium text-slate-200">Email or username</label>
        <input id="identifier" name="identifier" type="text" value="{{ identifier }}" autocomplete="username" required class="mt-2 block w-full rounded-md border border-white/10 bg-slate-950 px-3 py-2.5 text-sm text-white outline-none transition placeholder:text-slate-600 focus:border-teal-300/60 focus:ring-2 focus:ring-teal-300/20">
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-slate-200">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required class="mt-2 block w-full rounded-md border border-white/10 bg-slate-950 px-3 py-2.5 text-sm text-white outline-none transition placeholder:text-slate-600 focus:border-teal-300/60 focus:ring-2 focus:ring-teal-300/20">
      </div>

      <button type="submit" class="inline-flex w-full items-center justify-center rounded-md bg-teal-400 px-4 py-2.5 text-sm font-semibold text-slate-950 transition hover:bg-teal-300">Sign in</button>
    </form>
  </section>
</main>
{% endblock %}
