{% extends "base.html" %}

{% block content %}
<main class="site-shell flex min-h-screen items-center justify-center px-5 py-12 text-neutral-950">
  <section class="w-full max-w-md">
    <div class="mb-8">
      <div class="flex items-center justify-between gap-4">
        <a href="{{ url_with_lang(request, '/') }}" class="text-sm font-medium text-neutral-600 transition hover:text-neutral-950">{{ t(request, "brand.name") }}</a>
        {% include "components/language_switcher.html" %}
      </div>
      <h1 class="mt-4 text-3xl font-semibold tracking-tight text-neutral-950">登录</h1>
      <p class="mt-3 text-sm leading-6 text-neutral-600">登录后可以发表评论；管理员账号可进入后台。</p>
    </div>

    {% if error %}
      <div class="mb-5 rounded-md border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-medium text-rose-700">
        {{ error }}
      </div>
    {% endif %}

    <form action="{{ url_with_lang(request, '/auth/login') }}" method="post" class="panel space-y-5 p-6">
      <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
      <input type="hidden" name="next" value="{{ next_url }}">

      <div>
        <label for="identifier" class="block text-sm font-medium text-neutral-700">{{ t(request, "login.identifier") }}</label>
        <input id="identifier" name="identifier" type="text" value="{{ identifier }}" autocomplete="username" required class="field">
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-neutral-700">{{ t(request, "login.password") }}</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required class="field">
      </div>

      <button type="submit" class="btn-primary w-full">{{ t(request, "login.submit") }}</button>
    </form>

    <p class="mt-5 text-center text-sm text-neutral-600">
      还没有账号？
      <a href="{{ url_with_lang(request, '/auth/register', {'next': next_url}) }}" class="font-medium text-blue-600 transition hover:text-blue-700">立即注册</a>
    </p>
  </section>
</main>
{% endblock %}
