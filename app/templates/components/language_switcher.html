{% set lang = current_lang(request) %}
<div class="inline-flex items-center rounded-full border border-white/10 bg-white/[0.035] p-1 text-xs font-semibold text-zinc-400 shadow-sm shadow-black/20" aria-label="Language switcher">
  <a href="{{ switch_lang_url(request, 'en') }}" class="rounded-full px-2.5 py-1 transition {% if lang == 'en' %}bg-white text-zinc-950{% else %}hover:bg-white/[0.07] hover:text-white{% endif %}">EN</a>
  <a href="{{ switch_lang_url(request, 'zh') }}" class="rounded-full px-2.5 py-1 transition {% if lang == 'zh' %}bg-white text-zinc-950{% else %}hover:bg-white/[0.07] hover:text-white{% endif %}">中文</a>
</div>
