{% set lang = current_lang(request) %}
<div class="inline-flex h-9 items-center rounded-full border border-white/10 bg-white/[0.03] p-1 text-xs font-medium text-zinc-400" aria-label="Language switcher">
  <a href="{{ switch_lang_url(request, 'zh') }}" class="inline-flex h-7 items-center rounded-full px-2.5 transition {% if lang == 'zh' %}bg-white text-zinc-950{% else %}hover:bg-white/[0.07] hover:text-white{% endif %}">{{ t(request, 'lang.zh') }}</a>
  <a href="{{ switch_lang_url(request, 'en') }}" class="inline-flex h-7 items-center rounded-full px-2.5 transition {% if lang == 'en' %}bg-white text-zinc-950{% else %}hover:bg-white/[0.07] hover:text-white{% endif %}">{{ t(request, 'lang.en') }}</a>
</div>
