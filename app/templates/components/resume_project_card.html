<article data-reveal class="card-surface card-interactive">
  <h3 class="card-title">{{ t(request, project.title) }}</h3>
  <div class="mt-4 space-y-5">
    <div>
      <p class="text-xs uppercase tracking-[0.16em] text-neutral-500">{{ t(request, 'resume.role') }}</p>
      <p class="mt-2 text-sm leading-7 text-neutral-700">{{ t(request, project.role) }}</p>
    </div>
    <div>
      <p class="text-xs uppercase tracking-[0.16em] text-neutral-500">{{ t(request, 'resume.key_result') }}</p>
      <p class="mt-2 text-sm leading-7 text-neutral-600">{{ t(request, project.result) }}</p>
    </div>
    <div>
      <p class="text-xs uppercase tracking-[0.16em] text-neutral-500">{{ t(request, 'resume.tech_scope') }}</p>
      <div class="mt-3 flex flex-wrap gap-2">
        {% for tech in project.tech %}<span class="tag-neutral">{{ tech }}</span>{% endfor %}
      </div>
    </div>
  </div>
</article>
