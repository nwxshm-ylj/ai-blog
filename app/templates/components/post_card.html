<article class="rounded-lg border border-white/10 bg-white/[0.03] p-6 transition hover:border-teal-300/45 hover:bg-white/[0.05]">
  <div class="flex flex-wrap items-center gap-3 text-xs text-slate-500">
    <time datetime="{{ post.published_at.isoformat() }}">{{ post.published_at.strftime("%b %d, %Y") }}</time>
    <span aria-hidden="true">/</span>
    <a href="/blog?category={{ post.category | urlencode }}" class="text-teal-200 hover:text-teal-100">{{ post.category }}</a>
    <span aria-hidden="true">/</span>
    <span>{{ post.reading_time_minutes }} min read</span>
  </div>
  <h2 class="mt-4 text-2xl font-semibold tracking-tight text-white">
    <a href="/blog/{{ post.slug }}" class="hover:text-teal-100">{{ post.title }}</a>
  </h2>
  <p class="mt-3 leading-7 text-slate-400">{{ post.description }}</p>
  <div class="mt-5 flex flex-wrap gap-2">
    {% for tag in post.tags %}
      {% include "components/tag_pill.html" %}
    {% endfor %}
  </div>
</article>
