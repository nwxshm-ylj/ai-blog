<article data-reveal class="card-surface group overflow-hidden card-interactive">
  <div class="flex flex-wrap items-center gap-3 text-xs text-neutral-500">
    <time datetime="{{ post.published_at.isoformat() }}">{{ post.published_at.strftime("%b %d, %Y") }}</time>
    <span aria-hidden="true">/</span>
    <a href="{{ url_with_lang(request, '/blog', {'category': post.category}) }}" class="transition hover:text-neutral-950">{{ post.category }}</a>
    <span aria-hidden="true">/</span>
    <span>{{ post.reading_time_minutes }} {{ t(request, "blog.min_read") }}</span>
  </div>
  <h2 class="card-title mt-4">
    <a href="{{ url_with_lang(request, '/blog/' ~ post.slug) }}" class="transition hover:text-neutral-700">{{ post.title }}</a>
  </h2>
  <p class="mt-3 text-sm leading-7 text-neutral-600">{{ post.description }}</p>
  <div class="mt-4 flex flex-wrap gap-2">
    {% for tag in post.tags %}{% include "components/tag_pill.html" %}{% endfor %}
  </div>
</article>
