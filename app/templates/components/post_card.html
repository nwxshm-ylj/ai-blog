<article class="panel card-hover group p-5 sm:p-6">
  <div class="flex flex-wrap items-center gap-3 text-xs text-zinc-500">
    <time datetime="{{ post.published_at.isoformat() }}">{{ post.published_at.strftime("%b %d, %Y") }}</time>
    <span aria-hidden="true">/</span>
    <a href="{{ url_with_lang(request, '/blog', {'category': post.category}) }}" class="text-cyan-200 transition hover:text-cyan-100">{{ post.category }}</a>
    <span aria-hidden="true">/</span>
    <span>{{ post.reading_time_minutes }} {{ t(request, "blog.min_read") }}</span>
    <span aria-hidden="true">/</span>
    <span>{{ post.view_count }} views</span>
  </div>
  <h2 class="mt-4 text-2xl font-semibold tracking-tight text-white">
    <a href="{{ url_with_lang(request, '/blog/' ~ post.slug) }}" class="transition hover:text-cyan-100">{{ post.title }}</a>
  </h2>
  <p class="muted-copy mt-3">{{ post.description }}</p>
  <div class="mt-5 flex flex-wrap gap-2">
    {% for tag in post.tags %}
      {% include "components/tag_pill.html" %}
    {% endfor %}
  </div>
  <div class="mt-5 h-px bg-gradient-to-r from-cyan-300/30 via-white/10 to-transparent transition group-hover:from-cyan-200/60"></div>
</article>
