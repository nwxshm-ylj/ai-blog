{% set flash_messages = get_flashed_messages(request) %}
{% if flash_messages %}
  <div class="fixed inset-x-0 top-20 z-50 mx-auto w-full max-w-3xl px-5">
    <div class="space-y-3">
      {% for flash in flash_messages %}
        <div class="rounded-md border px-4 py-3 text-sm font-medium shadow-lg shadow-black/5 {% if flash.category == 'error' %}border-rose-200 bg-rose-50 text-rose-700{% elif flash.category == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-700{% else %}border-blue-200 bg-blue-50 text-blue-700{% endif %}">
          {{ flash.message }}
        </div>
      {% endfor %}
    </div>
  </div>
{% endif %}
