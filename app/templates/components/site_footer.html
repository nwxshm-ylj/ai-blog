<footer class="relative border-t border-white/10 bg-zinc-950/90">
  <div class="pointer-events-none absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-cyan-200/40 to-transparent"></div>
  <div class="container-page grid gap-8 py-12 text-sm text-zinc-500 md:grid-cols-[1fr_auto] md:items-center">
    <div>
      <p class="font-medium text-zinc-200">{{ t(request, "footer.description") }}</p>
      <p class="mt-2 max-w-2xl leading-6">{{ t(request, "footer.focus") }}</p>
    </div>
    <div class="flex flex-wrap items-center gap-4">
      <a href="{{ url_with_lang(request, '/blog') }}" class="transition hover:text-white">{{ t(request, "nav.blog") }}</a>
      <a href="{{ url_with_lang(request, '/projects') }}" class="transition hover:text-white">{{ t(request, "nav.projects") }}</a>
      <a href="{{ url_with_lang(request, '/admin') }}" class="transition hover:text-white">{{ t(request, "nav.admin") }}</a>
      {% include "components/language_switcher.html" %}
    </div>
  </div>
</footer>
