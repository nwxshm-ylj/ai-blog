<div class="mb-10 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
  <div>
    {% if eyebrow %}
      <p class="text-xs font-medium uppercase tracking-[0.14em] text-cyan-100">{{ eyebrow }}</p>
    {% endif %}
    <h2 class="mt-3 max-w-3xl text-3xl font-medium leading-tight tracking-tight text-white">{{ heading }}</h2>
    {% if description %}
      <p class="mt-4 max-w-2xl text-sm leading-6 text-zinc-400">{{ description }}</p>
    {% endif %}
  </div>
  {% if action_href and action_label %}
    <a href="{{ action_href }}" class="inline-flex h-10 items-center rounded-lg border border-white/10 px-4 text-sm font-medium text-zinc-200 transition hover:bg-white/[0.06] hover:text-white">{{ action_label }}</a>
  {% elif meta %}
    <span class="text-sm text-zinc-500">{{ meta }}</span>
  {% endif %}
</div>
