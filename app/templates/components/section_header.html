<div class="mb-10 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
  <div>
    {% if eyebrow %}
      <p class="label-copy">{{ eyebrow }}</p>
    {% endif %}
    <h2 class="section-title mt-4 max-w-3xl">{{ heading }}</h2>
    {% if description %}
      <p class="body-copy mt-4 max-w-2xl text-sm leading-7">{{ description }}</p>
    {% endif %}
  </div>
  {% if action_href and action_label %}
    <a href="{{ action_href }}" class="btn-secondary">{{ action_label }}</a>
  {% elif meta %}
    <span class="text-sm text-neutral-500">{{ meta }}</span>
  {% endif %}
</div>
