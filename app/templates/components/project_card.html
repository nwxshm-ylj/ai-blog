<article class="group flex h-full flex-col rounded-lg border border-white/10 bg-white/[0.03] p-5 transition hover:border-teal-300/45 hover:bg-white/[0.05] sm:p-6">
  <div class="flex items-start justify-between gap-4">
    <div>
      <p class="text-xs font-medium uppercase tracking-wide text-teal-200">{{ project.category }}</p>
      <h2 class="mt-3 text-xl font-semibold tracking-tight text-white">
        <a href="/projects/{{ project.slug }}" class="hover:text-teal-100">{{ project.title }}</a>
      </h2>
    </div>
    <span class="shrink-0 rounded-full border border-white/10 px-2.5 py-1 text-xs text-slate-400">{{ project.status }}</span>
  </div>

  <p class="mt-4 leading-7 text-slate-400">{{ project.summary }}</p>

  <div class="mt-5 flex flex-wrap gap-2">
    {% for tech in project.tech_stack[:4] %}
      {% include "components/tech_tag.html" %}
    {% endfor %}
  </div>

  <div class="mt-6 flex flex-col gap-4 border-t border-white/10 pt-5 sm:flex-row sm:items-center sm:justify-between">
    <a href="/projects/{{ project.slug }}" class="text-sm font-semibold text-teal-200 transition hover:text-teal-100">
      View case study
    </a>
    {% include "components/project_links.html" %}
  </div>
</article>
