<section class="border-b border-white/10 bg-white/[0.012]">
  <div class="container-page section-pad">
    {% if back_href and back_label %}
      <a href="{{ back_href }}" class="btn-ghost">{{ back_label }}</a>
    {% endif %}
    {% if eyebrow %}
      <p class="label-copy {% if back_href and back_label %}mt-6{% endif %}">{{ eyebrow }}</p>
    {% endif %}
    <h1 class="page-title text-balance mt-4">{{ heading }}</h1>
    {% if description %}
      <p class="body-copy mt-6 max-w-3xl">{{ description }}</p>
    {% endif %}
  </div>
</section>
