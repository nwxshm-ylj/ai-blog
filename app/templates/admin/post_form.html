{% extends "admin/layout.html" %}

{% block admin_content %}
<div class="mb-8">
  <p class="eyebrow text-blue-200">内容</p>
  <h1 class="mt-3 text-3xl font-semibold tracking-tight text-white sm:text-4xl">{{ form_title }}</h1>
  <p class="muted-copy mt-3 max-w-2xl">编辑文章内容、封面和 SEO 信息。</p>
</div>

{% if errors %}
  <div class="mb-6 rounded-md border border-rose-300/20 bg-rose-400/10 px-4 py-3 text-sm text-rose-100">
    <p class="font-semibold">请修正以下字段：</p>
    <ul class="mt-2 list-disc space-y-1 pl-5">
      {% for error in errors %}
        <li>{{ error }}</li>
      {% endfor %}
    </ul>
  </div>
{% endif %}

<form action="{{ form_action }}" method="post" enctype="multipart/form-data" class="panel space-y-6 p-5 sm:p-6">
  <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
  <div class="grid gap-5 lg:grid-cols-2">
    <label class="block">
      <span class="text-sm font-medium text-zinc-300">标题</span>
      <input name="title" value="{{ post.title }}" type="text" class="field" required>
    </label>
    <label class="block">
      <span class="text-sm font-medium text-zinc-300">链接标识</span>
      <input name="slug" value="{{ post.slug }}" type="text" class="field" required>
    </label>
  </div>

  <label class="block">
    <span class="text-sm font-medium text-zinc-300">摘要</span>
    <textarea name="summary" rows="3" class="field" required>{{ post.summary }}</textarea>
  </label>

  <label class="block">
    <span class="text-sm font-medium text-zinc-300">Markdown 内容</span>
    <textarea name="markdown_content" rows="10" class="field font-mono" required>{{ post.markdown_content }}</textarea>
  </label>

  <div class="grid gap-5 lg:grid-cols-2">
    <label class="block">
      <span class="text-sm font-medium text-zinc-300">封面图片</span>
      <input name="cover_image" value="{{ post.cover_image }}" type="hidden">
      <input name="cover_image_upload" type="file" accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp" class="file-field">
      {% if post.cover_image %}
        <div class="mt-3 overflow-hidden rounded-md border border-white/10 bg-zinc-950">
          <img src="{{ post.cover_image }}" alt="当前文章封面" class="h-40 w-full object-cover">
        </div>
      {% endif %}
    </label>
    <label class="flex items-center gap-3 pt-8">
      <input name="is_published" type="checkbox" value="true" {% if post.is_published %}checked{% endif %} class="h-4 w-4 rounded border-white/10 bg-zinc-950 text-cyan-400 focus:ring-cyan-300/30">
      <span class="text-sm font-medium text-zinc-300">发布</span>
    </label>
  </div>

  <div class="grid gap-5 lg:grid-cols-2">
    <label class="block">
      <span class="text-sm font-medium text-zinc-300">SEO 标题</span>
      <input name="seo_title" value="{{ post.seo_title }}" type="text" class="field">
    </label>
    <label class="block">
      <span class="text-sm font-medium text-zinc-300">SEO 描述</span>
      <textarea name="seo_description" rows="3" class="field">{{ post.seo_description }}</textarea>
    </label>
  </div>

  <div class="flex flex-col-reverse gap-3 border-t border-white/10 pt-5 sm:flex-row sm:justify-end">
    <a href="{{ url_with_lang(request, '/admin/posts') }}" class="btn-secondary">取消</a>
    <button type="submit" class="btn-primary">{{ submit_label }}</button>
  </div>
</form>

{% if post.slug %}
  <form action="/admin/posts/{{ post.slug }}/delete" method="post" class="mt-4 flex justify-end">
    <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
    <button type="submit" class="btn-danger">删除文章</button>
  </form>
{% endif %}
{% endblock %}
